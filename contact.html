<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
	
        <h1>Contact Us</h1>
        <nav>
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='aboutus.html'">About Us</button>
			<button onclick="location.href='signup.php'">Signup</button>
			<button onclick="location.href='login.php'">Login</button>
        </nav>
    </header>
	<br>
	<br>
	<br>
	
    <div class="container">
        <form action="#" method="post">
            <div class="form-group">
                <label for="name" style="color:#4ab8c7;">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email" style="color:#4ab8c7;">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message" style="color:#4ab8c7;">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>

        <div class="contact-info">
            <h2 style="color:#4ab8c7;">Contact Information</h2>
            <p style="color:#4ab8c7;"><strong>Phone:</strong> +1 (123) 456-7890</p>
            <p style="color:#4ab8c7;"><strong>Email:</strong> info@quikbooks.com</p>
        </div>
    </div>
    <footer>
        <p>&copy; QuikBook 2024</p>
    </footer>
</body>
</html>
