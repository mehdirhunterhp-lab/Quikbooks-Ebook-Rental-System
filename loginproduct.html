<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>QuikBook</h1>
    <nav>
      <button onclick="location.href='dashboard.php'">Back To Dashboard</button>
      <button onclick="location.href='logout.php'">Logout</button>
    </nav>
  </header>

  <main><br><br>
    <div class="container">
      <div class="search-bar">
        <input type="text" id="searchName" placeholder="Search by book name..." onclick="redirectToSearchPage()">
      </div>
      <h1 style="text-align:center; margin-top:20px;">Featured Reads</h1>

      <div id="bookList" class="grid-container">
        <div class="book" data-name="Book 1" data-price="7">
          <h2>Naruto</h2>
          <a href="book1Logdot.html"><img src="Naruto.jpg" alt="Book 1"></a>
          <p>Rent Price: $7</p>
        </div>
        <div class="book" data-name="Book 2" data-price="5">
          <h2>Geronimo Stilton</h2>
          <a href="book2Logdot.html"><img src="Geronimo.jpg" alt="Book 2"></a>
          <p>Rent Price: $5</p>
        </div>
        <div class="book" data-name="Book 3" data-price="11">
          <h2>The 39 Clues</h2>
          <a href="book3Logdot.html"><img src="The39Clues.jpg" alt="Book 3"></a>
          <p>Rent Price: $11</p>
        </div>
        <div class="book" data-name="Book 4" data-price="13">
          <h2>Bleach</h2>
          <a href="book4Logdot.html"><img src="Bleach.jpg" alt="Book 4"></a>
          <p>Rent Price: $13</p>
        </div>
        <div class="book" data-name="Book 5" data-price="3">
          <h2>Ruri Dragon</h2>
          <a href="book5Logdot.html"><img src="ruri xd.jpg" alt="Book 5"></a>

        </div>
        <div class="book" data-name="Book 6" data-price="5">
          <h2>Goodbye Eri</h2>
          <a href="book6Logdot.html"><img src="eri.jpg" alt="Book 6"></a>
          <p>Rent Price: $5</p>
        </div>
        <div class="book" data-name="Book 7" data-price="7">
          <h2>How to Eat Life</h2>
          <a href="book7Logdot.html"><img src="eatlife.jpg" alt="Book 7"></a>

        </div>
        <!-- Add more books similarly -->
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; QuikBook 2024</p>
  </footer>

  <div id="hamburger" onclick="scrollToTop()">&#9776;</div>

  <script>
    // Redirect to the searchLogdn.html page when search bar is clicked
    function redirectToSearchPage() {
      window.location.href = 'searchLogdn.html';
    }

    // Scroll hide/show header
    window.onscroll = function() {
      const header = document.getElementById("header");
      const hamburger = document.getElementById("hamburger");
      if (document.body.scrollTop > 50 || document.documentElement.scrollTop > 50) {
        header.classList.add("hidden");
        hamburger.style.display = "block";
      } else {
        header.classList.remove("hidden");
        hamburger.style.display = "none";
      }
    };

    // Scroll to top when hamburger is clicked
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
